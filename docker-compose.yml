version: '3.8'

services:

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: nexvent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nexvent_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nexvent-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexvent-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/nexvent_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nexvent-network

  # Node.js Notification Service
  notification:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: nexvent-notification
    ports:
      - "5000:5000"
    networks:
      - nexvent-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexvent-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
      - notification
    networks:
      - nexvent-network

networks:
  nexvent-network:
    driver: bridge

volumes:
  mysql_data: